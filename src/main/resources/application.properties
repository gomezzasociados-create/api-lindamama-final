# ==========================================
# GOMEZ SYSTEMS - BASE DE DATOS (POSTGRESQL)
# ==========================================
# Prioriza las variables de entorno de la nube (Easypanel/Docker) y usa localhost como respaldo.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Linda236}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA / Hibernate: Actualiza las tablas sin borrar los registros existentes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desactivar consola H2 ya que ahora usamos PostgreSQL
spring.h2.console.enabled=false