<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Debug Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">
    <div class="container">
        <h1 class="text-danger">Error Detectado</h1>
        <hr>
        <h3>Mensaje:</h3>
        <p class="lead text-warning" th:text="${errorMessage}">Error message here</p>
        
        <h3 class="mt-4">Stack Trace / Detalles:</h3>
        <pre class="bg-black p-3 rounded" style="color: #0f0; overflow: auto;" th:text="${errorStack}">
            Stack trace here
        </pre>
        
        <a href="/socia/agenda" class="btn btn-primary mt-3">Reintentar</a>
    </div>
</body>
</html>
