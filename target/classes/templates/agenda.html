<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda Cyber-Spa - Linda Mamá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>

    <style>
        :root {
            --violeta-profundo: #100118;
            --violeta-tarjeta: #1c0229;
            --fucsia-neon: #ff00ff;
            --fucsia-brillo: rgba(255, 0, 255, 0.8);
            --cyan-neon: #00e5ff;
            --cyan-brillo: rgba(0, 229, 255, 0.6);
            --mp-blue: #009ee3;
            --blanco-puro: #ffffff;
        }
        body { background-color: var(--violeta-profundo); font-family: 'Poppins', sans-serif; color: var(--blanco-puro); padding: 30px 20px; margin: 0; }
        .header-agenda { border-bottom: 2px solid var(--fucsia-neon); padding-bottom: 20px; margin-bottom: 30px; box-shadow: 0 10px 15px -10px var(--fucsia-brillo); }
        .titulo-agenda { font-family: 'Playfair Display', serif; font-weight: 900; color: var(--blanco-puro); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--fucsia-neon), 0 0 20px var(--fucsia-neon); margin: 0; }
        .btn-cyber { background: transparent; color: var(--cyan-neon); border: 2px solid var(--cyan-neon); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 10px rgba(0,229,255,0.3); transition: 0.3s; }
        .btn-cyber:hover { background: var(--cyan-neon); color: var(--violeta-profundo); box-shadow: 0 0 20px var(--cyan-brillo); }
        #calendario { background: var(--violeta-tarjeta); padding: 20px; border-radius: 15px; border: 2px solid var(--fucsia-neon); box-shadow: 0 0 25px rgba(255, 0, 255, 0.3); }
        .fc-theme-standard td, .fc-theme-standard th { border-color: rgba(255, 0, 255, 0.2) !important; }
        .fc-col-header-cell { background-color: #2a0342; padding: 10px 0; }
        .fc-col-header-cell-cushion { color: var(--blanco-puro) !important; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .fc-timegrid-slot-label-cushion { color: var(--cyan-neon) !important; font-weight: 800; font-size: 1.1rem; }
        .fc-button-primary { background: linear-gradient(135deg, var(--fucsia-neon) 0%, #c01a7c 100%) !important; border: none !important; font-weight: 700 !important; text-transform: uppercase !important; box-shadow: 0 0 10px var(--fucsia-brillo); transition: 0.3s !important; }
        .fc-toolbar-title { color: var(--cyan-neon); font-weight: 800 !important; text-shadow: 0 0 10px rgba(0,229,255,0.4); text-transform: uppercase; }

        /* Estilo de los bloques de eventos */
        .fc-event { border: none !important; color: #100118 !important; font-weight: 700; padding: 2px 5px; border-radius: 6px; font-size: 0.85rem; }
        .fc-event-main { white-space: normal !important; } /* Permite que el texto se vea en varias líneas */

        .spinner-mp { width: 1.5rem; height: 1.5rem; border-width: 0.2em; display: none; margin-right: 10px; }
        @keyframes latido { 0% { box-shadow: 0 0 10px rgba(255, 0, 85, 0.2); } 50% { box-shadow: 0 0 25px rgba(255, 0, 85, 0.6); } 100% { box-shadow: 0 0 10px rgba(255, 0, 85, 0.2); } }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="header-agenda d-flex justify-content-between align-items-center">
        <h2 class="titulo-agenda">📅 Agenda de Citas</h2>
        <div>
            <a href="/catalogo" class="btn btn-cyber me-3"><i class="bi bi-cart3"></i> Ver Catálogo</a>
            <a href="/admin" class="btn btn-outline-light"><i class="bi bi-speedometer2"></i> Admin</a>
        </div>
    </div>
    <div id="calendario"></div>
</div>

<div class="modal fade" id="modalReserva" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: #1c0229; border: 2px solid #00e5ff; box-shadow: 0 0 30px rgba(0, 229, 255, 0.4); color: white; border-radius: 15px;">
            <div class="modal-header" style="border-bottom: 1px solid rgba(0,229,255,0.3);">
                <h5 class="modal-title fw-bold" style="color: #00e5ff;">Confirma tu Cita VIP</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3 text-center">
                    <h5 id="resumen-fecha" style="color: #ff00ff; font-weight: 800; text-transform: capitalize;">...</h5>
                </div>
                <div class="p-3 mb-4 text-center" style="background: rgba(255, 0, 85, 0.1); border: 2px solid #ff0055; border-radius: 10px; animation: latido 2s infinite;">
                    <i class="bi bi-stopwatch" style="color: #ff0055; font-size: 1.8rem;"></i>
                    <span style="color: white; font-weight: 700; font-size: 0.95rem; margin-left: 10px;">
                        Bloquearemos tu hora por <span style="color: #ff0055;">10 minutos</span> para completar el pago.
                    </span>
                </div>
                <div class="mb-3">
                    <ul id="resumen-carrito-agenda" class="list-group list-group-flush rounded mb-2" style="background: rgba(0,0,0,0.4);"></ul>
                    <h4 class="text-end fw-bold">Total: <span id="resumen-total-agenda" style="color: #ff00ff;">$0</span></h4>
                </div>
                <div class="p-3 mb-3" style="background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 10px;">
                    <label class="form-label fw-bold mb-3" style="color: #00e5ff;"><i class="bi bi-wallet2 me-2"></i>¿Cómo deseas pagar?</label>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="opcionPago" id="pagoTotal" value="total" checked>
                        <label class="form-check-label text-white fw-bold" for="pagoTotal">Pagar Total (<span id="txt-pago-total">$0</span>)</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="opcionPago" id="pagoAbono" value="abono">
                        <label class="form-check-label text-white fw-bold" for="pagoAbono">Abono 20% (<span id="txt-pago-abono">$0</span>)</label>
                    </div>
                </div>
                <form id="form-cliente">
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #00e5ff;">Tu Nombre</label>
                        <input type="text" class="form-control bg-dark text-white border-info" id="cliente-nombre" required placeholder="Ej. Camila Pérez">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #00e5ff;">Tu WhatsApp</label>
                        <input type="tel" class="form-control bg-dark text-white border-info" id="cliente-telefono" required placeholder="+56 9...">
                    </div>
                    <input type="hidden" id="fecha-iso-oculta">
                </form>
            </div>
            <div class="modal-footer" style="border-top: 1px solid rgba(0,229,255,0.3);">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn d-flex align-items-center justify-content-center" id="btn-procesar-reserva" style="background: linear-gradient(135deg, var(--mp-blue) 0%, #005f8f 100%); color: white; font-weight: 800; width: 60%;">
                    <div class="spinner-border spinner-mp text-light" role="status" id="spinner-pago"></div>
                    <span id="texto-btn-pago"><i class="bi bi-credit-card me-2"></i> Pagar Seguro</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendario');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'es',
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,timeGridDay' },
            slotMinTime: '08:00:00', slotMaxTime: '20:00:00', allDaySlot: false, nowIndicator: true,
            buttonText: { today: 'Hoy', week: 'Semana', day: 'Día' },

            // LÓGICA DE EVENTOS (CLIENTE + SERVICIO)
            events: function(info, successCallback, failureCallback) {
                fetch('/api/citas')
                    .then(res => res.json())
                    .then(data => {
                        let eventos = data.map(c => {
                            if (!c.fechaHora) return null;

                            let esConfirmado = (c.estado === 'PAGADO' || c.estado === 'CONFIRMADO');
                            let color = esConfirmado ? '#00e5ff' : '#ff9800';

                            // Obtenemos los nombres para el título
                            let nombreCliente = c.cliente ? c.cliente.nombre : 'Cliente';
                            let servicio = c.nombreTratamiento ? c.nombreTratamiento : 'Servicio';

                            // Título combinado: ✅ Nombre - Servicio o ⏱️ Nombre - Servicio (RESERVADO)
                            let titulo = esConfirmado
                                ? '✅ ' + nombreCliente + ' | ' + servicio
                                : '⏱️ ' + nombreCliente + ' - ' + servicio + ' (RESERVADO)';

                            return {
                                title: titulo,
                                start: c.fechaHora,
                                backgroundColor: color,
                                borderColor: color,
                                textColor: '#100118'
                            };
                        }).filter(e => e !== null);
                        successCallback(eventos);
                    })
                    .catch(err => console.error("Error al cargar citas:", err));
            },
            dateClick: function(info) { abrirFormularioReserva(info.dateStr); }
        });
        calendar.render();
    });

    function abrirFormularioReserva(fechaIso) {
        document.getElementById('fecha-iso-oculta').value = fechaIso;
        const fechaObj = new Date(fechaIso);
        document.getElementById('resumen-fecha').innerText = fechaObj.toLocaleString('es-CL', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });

        let carrito = JSON.parse(localStorage.getItem('spaCarrito')) || [];
        const lista = document.getElementById('resumen-carrito-agenda');
        lista.innerHTML = '';
        let total = 0;

        if(carrito.length === 0) {
            lista.innerHTML = `<li class="list-group-item bg-transparent text-white text-center">No has seleccionado servicios en el catálogo</li>`;
            document.getElementById('btn-procesar-reserva').disabled = true;
        } else {
            document.getElementById('btn-procesar-reserva').disabled = false;
            carrito.forEach(i => {
                total += parseFloat(i.precio);
                lista.innerHTML += `<li class="list-group-item bg-transparent text-white d-flex justify-content-between"><span>${i.nombre}</span><b>$${Number(i.precio).toLocaleString('es-CL')}</b></li>`;
            });
        }
        document.getElementById('resumen-total-agenda').innerText = '$' + total.toLocaleString('es-CL');
        document.getElementById('txt-pago-total').innerText = '$' + total.toLocaleString('es-CL');
        document.getElementById('txt-pago-abono').innerText = '$' + (total * 0.2).toLocaleString('es-CL');
        new bootstrap.Modal(document.getElementById('modalReserva')).show();
    }

    document.getElementById('btn-procesar-reserva').addEventListener('click', function() {
        const nombre = document.getElementById('cliente-nombre').value.trim();
        const telefono = document.getElementById('cliente-telefono').value.trim();
        let fecha = document.getElementById('fecha-iso-oculta').value;
        const carrito = JSON.parse(localStorage.getItem('spaCarrito')) || [];
        const opcion = document.querySelector('input[name="opcionPago"]:checked').value;

        if(!nombre || !telefono) return alert("Por favor, ingresa tu Nombre y WhatsApp");
        if(carrito.length === 0) return alert("El catálogo está vacío. Elige un servicio primero.");

        // LIMPIEZA DE FECHA PARA EL BACKEND JAVA (Solo YYYY-MM-DDTHH:mm:ss)
        if(fecha.length > 19) fecha = fecha.substring(0, 19);

        let total = 0;
        carrito.forEach(i => total += parseFloat(i.precio));
        let monto = Math.floor(opcion === 'total' ? total : total * 0.2);

        document.getElementById('btn-procesar-reserva').disabled = true;
        document.getElementById('spinner-pago').style.display = 'inline-block';
        document.getElementById('texto-btn-pago').innerText = 'Conectando...';

        // ENVÍO DE DATOS AL BACKEND
        fetch('/api/pagos/crear-preferencia', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                titulo: "Reserva - " + (carrito.map(i => i.nombre).join(", ")),
                precio: monto,
                nombre: nombre,
                telefono: telefono,
                fechaAgendamiento: fecha // Coincide con PagoRestController
            })
        })
        .then(res => res.text())
        .then(url => {
            if(url.startsWith("http")) {
                localStorage.removeItem('spaCarrito');
                window.location.href = url;
            } else {
                alert("Error del Servidor: " + url);
                document.getElementById('btn-procesar-reserva').disabled = false;
                document.getElementById('spinner-pago').style.display = 'none';
                document.getElementById('texto-btn-pago').innerHTML = '<i class="bi bi-credit-card me-2"></i> Pagar Seguro';
            }
        })
        .catch(err => {
            alert("Error de conexión. Revisa que el servidor esté corriendo.");
            console.error(err);
            document.getElementById('btn-procesar-reserva').disabled = false;
            document.getElementById('spinner-pago').style.display = 'none';
        });
    });
</script>
</body>
</html>
