<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Linda Mamá Spa - POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* Contenedor Principal */
        .pos-container { height: 100vh; padding: 20px; }

        /* Estilo de las Tarjetas de Tratamiento */
        .card-servicio {
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 15px;
        }
        .card-servicio:hover {
            border-color: #ff00ff;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 0, 255, 0.3);
            background: #252525;
        }
        .card-servicio h5 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-servicio .precio { color: #ff00ff; font-weight: bold; font-size: 1.1rem; }

        /* Barra Lateral del Carrito */
        .carrito {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 25px;
            height: 90vh;
            border-left: 4px solid #ff00ff;
            position: sticky;
            top: 20px;
        }

        .btn-fucsia { background-color: #ff00ff; border: none; color: white; font-weight: bold; transition: 0.3s; }
        .btn-fucsia:hover { background-color: #cc00cc; transform: scale(1.02); }
        .btn-outline-fucsia { border: 1px solid #ff00ff; color: #ff00ff; background: transparent; transition: 0.3s; }
        .btn-outline-fucsia:hover { background-color: rgba(255, 0, 255, 0.1); color: #ff00ff; }

        .item-carrito { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 10px 0; font-size: 0.9rem; }

        #lista-busqueda { position: absolute; z-index: 1000; width: 100%; background: #2d2d2d; border-radius: 0 0 10px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .cliente-opcion { padding: 12px; cursor: pointer; border-bottom: 1px solid #3d3d3d; }
        .cliente-opcion:hover { background: #ff00ff; color: white; }

        /* Inputs oscuros */
        .input-dark { background-color: #2a2a2a; border: 1px solid #444; color: white; }
        .input-dark:focus { background-color: #2a2a2a; color: white; border-color: #ff00ff; box-shadow: none; }
        .input-dark:disabled { background-color: #1a1a1a; color: #777; border-color: #333; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body>

<div class="container-fluid pos-container">
    <div class="row">
        <div class="col-md-7 col-lg-8 px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 style="font-weight: 600;">✨ Linda Mamá POS</h2>
                <span class="badge bg-dark border border-secondary p-2">Terminal 01</span>
            </div>

            <div class="position-relative mb-4">
                <label class="form-label text-secondary small">BUSCAR CLIENTA REGISTRADA</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-search">🔍</i></span>
                    <input type="text" id="input-buscador" class="form-control form-control-lg bg-dark text-white border-secondary"
                           placeholder="Buscar por nombre o celular..." onkeyup="buscarCliente()">
                </div>
                <div id="lista-busqueda"></div>
            </div>

            <div class="row overflow-auto pe-2" style="max-height: 65vh;">
                <div class="col-md-6 col-lg-4 mb-3" th:each="s : ${servicios}">
                    <div class="card card-servicio"
                         th:data-id="${s.id}"
                         th:data-nombre="${s.nombre}"
                         th:data-precio="${s.precio}"
                         onclick="capturarServicio(this)">
                        <h5 th:text="${s.nombre}">Tratamiento</h5>
                        <div class="precio" th:text="'$' + ${#numbers.formatInteger(s.precio, 0, 'POINT')}">$0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-5 col-lg-4">
            <div class="carrito d-flex flex-column shadow-lg">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0 text-fucsia" style="color:#ff00ff;">📋 Datos de la Venta</h5>
                    <button class="btn btn-sm btn-outline-secondary" onclick="limpiarCliente()" id="btn-limpiar" style="display:none; font-size: 0.7rem;">
                        Limpiar Clienta
                    </button>
                </div>

                <div class="p-3 mb-3" style="background: #252525; border-radius: 10px; border: 1px dashed #444;">
                    <div class="mb-2">
                        <label class="form-label small text-secondary mb-1">NOMBRE COMPLETO <span class="text-danger">*</span></label>
                        <input type="text" id="cliente-nombre" class="form-control form-control-sm input-dark" placeholder="Ej: María Gómez">
                    </div>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label small text-secondary mb-1">TELÉFONO (WhatsApp)</label>
                            <input type="text" id="cliente-telefono" class="form-control form-control-sm input-dark" placeholder="+569...">
                        </div>
                        <div class="col-6">
                            <label class="form-label small text-secondary mb-1">CORREO</label>
                            <input type="email" id="cliente-correo" class="form-control form-control-sm input-dark" placeholder="@">
                        </div>
                    </div>
                    <input type="hidden" id="cliente-id" value="">
                </div>

                <div class="mb-3">
                    <label class="form-label small text-secondary mb-1">FECHA Y HORA DEL SERVICIO</label>
                    <input type="datetime-local" id="fecha-servicio" class="form-control form-control-sm input-dark">
                </div>

                <hr class="border-secondary my-2">

                <div id="items-pos" style="flex-grow: 1; overflow-y: auto; min-height: 100px;">
                    <div class="text-center text-secondary small mt-4">
                        Selecciona servicios para agregar a la cuenta
                    </div>
                </div>

                <hr class="border-secondary my-2">

                <div class="d-flex justify-content-between align-items-center mb-3 px-2">
                    <span class="h6 mb-0 text-secondary">TOTAL A COBRAR</span>
                    <span id="total-final" class="h3 mb-0" style="color: #ff00ff; font-weight: bold;">$0</span>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-secondary mb-1">MÉTODO DE PAGO</label>
                    <select id="metodo-pago" class="form-select input-dark">
                        <option value="EFECTIVO">💵 Efectivo (Caja)</option>
                        <option value="TARJETA">💳 Tarjeta (Transbank)</option>
                        <option value="TRANSFERENCIA">🏦 Transferencia Bancaria</option>
                        <option value="MERCADO_PAGO">📱 Link de Mercado Pago</option>
                    </select>
                </div>

                <button class="btn btn-fucsia w-100 py-3 rounded text-uppercase" onclick="confirmarVenta()">
                    Procesar Venta
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let carrito = [];

    // Poner la fecha actual por defecto en el calendario
    window.onload = () => {
        const ahora = new Date();
        ahora.setMinutes(ahora.getMinutes() - ahora.getTimezoneOffset());
        document.getElementById('fecha-servicio').value = ahora.toISOString().slice(0,16);
    };

    // FUNCIÓN DEL BUSCADOR
    function buscarCliente() {
        const query = document.getElementById('input-buscador').value;
        if (query.length < 2) { document.getElementById('lista-busqueda').innerHTML = ''; return; }

        fetch(`/api/pos/buscar-cliente?query=${query}`)
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(c => {
                    // Pasamos los datos completos al hacer clic
                    html += `<div class="cliente-opcion" onclick="seleccionarCliente(${c.id}, '${c.nombre}', '${c.telefono || ''}', '${c.correo || ''}')">
                                <strong>${c.nombre}</strong> <br> <small class="text-muted">${c.telefono || 'Sin teléfono'}</small>
                             </div>`;
                });
                document.getElementById('lista-busqueda').innerHTML = html;
            })
            .catch(e => console.error("Error buscando:", e));
    }

    // CUANDO SELECCIONAN A ALGUIEN DEL BUSCADOR
    function seleccionarCliente(id, nombre, telefono, correo) {
        // Llenar casillas
        document.getElementById('cliente-id').value = id;
        document.getElementById('cliente-nombre').value = nombre;
        document.getElementById('cliente-telefono').value = telefono;
        document.getElementById('cliente-correo').value = correo;

        // Bloquear casillas (porque ya existe en BD)
        document.getElementById('cliente-nombre').disabled = true;
        document.getElementById('cliente-telefono').disabled = true;
        document.getElementById('cliente-correo').disabled = true;

        // Limpiar buscador y mostrar botón de limpiar
        document.getElementById('lista-busqueda').innerHTML = '';
        document.getElementById('input-buscador').value = '';
        document.getElementById('btn-limpiar').style.display = 'block';
    }

    // PARA VOLVER A ESCRIBIR MANUALMENTE
    function limpiarCliente() {
        document.getElementById('cliente-id').value = "";
        document.getElementById('cliente-nombre').value = "";
        document.getElementById('cliente-telefono').value = "";
        document.getElementById('cliente-correo').value = "";

        document.getElementById('cliente-nombre').disabled = false;
        document.getElementById('cliente-telefono').disabled = false;
        document.getElementById('cliente-correo').disabled = false;

        document.getElementById('btn-limpiar').style.display = 'none';
        document.getElementById('cliente-nombre').focus();
    }

    // LÓGICA DEL CARRITO
    function capturarServicio(elemento) {
        const id = elemento.getAttribute('data-id');
        const nombre = elemento.getAttribute('data-nombre');
        const precio = parseInt(elemento.getAttribute('data-precio'));
        carrito.push({ id, nombre, precio });
        renderizarCarrito();
    }

    function renderizarCarrito() {
        const div = document.getElementById('items-pos');
        if (carrito.length === 0) {
            div.innerHTML = '<div class="text-center text-secondary small mt-4">Selecciona servicios para agregar a la cuenta</div>';
            document.getElementById('total-final').innerText = "$0";
            return;
        }

        div.innerHTML = '';
        let total = 0;
        carrito.forEach((item, index) => {
            total += item.precio;
            div.innerHTML += `
                <div class="item-carrito align-items-center">
                    <span style="flex:1;">${item.nombre}</span>
                    <span class="fw-bold me-2 text-white">$${item.precio.toLocaleString('es-CL')}</span>
                    <button class="btn btn-sm btn-outline-danger border-0 p-1 lh-1" onclick="quitar(${index})" title="Quitar">✕</button>
                </div>`;
        });
        document.getElementById('total-final').innerText = "$" + total.toLocaleString('es-CL');
    }

    function quitar(index) {
        carrito.splice(index, 1);
        renderizarCarrito();
    }

    // ENVIAR VENTA AL BACKEND
    function confirmarVenta() {
        if (carrito.length === 0) return alert("⚠️ Agregue al menos un servicio al carrito.");

        const nombreCliente = document.getElementById('cliente-nombre').value.trim();
        if (!nombreCliente) return alert("⚠️ Debe ingresar el nombre de la clienta.");

        const fecha = document.getElementById('fecha-servicio').value;
        if (!fecha) return alert("⚠️ Seleccione una fecha para la cita.");

        // Construir el objeto de venta.
        // Si cliente-id está vacío, el backend debe entender que tiene que crear el cliente con estos datos.
        const venta = {
            clienteId: document.getElementById('cliente-id').value || null,
            nuevoClienteNombre: nombreCliente,
            nuevoClienteTelefono: document.getElementById('cliente-telefono').value.trim(),
            nuevoClienteCorreo: document.getElementById('cliente-correo').value.trim(),
            nombreTratamiento: carrito.map(i => i.nombre).join(" + "),
            totalPagado: carrito.reduce((sum, i) => sum + i.precio, 0),
            metodoPago: document.getElementById('metodo-pago').value,
            fechaHora: fecha,
            estado: document.getElementById('metodo-pago').value === 'MERCADO_PAGO' ? 'RESERVADO' : 'CONFIRMADO'
        };

        // Deshabilitar botón para evitar doble clic
        const btn = document.querySelector('.btn-fucsia');
        btn.disabled = true;
        btn.innerText = "Procesando...";

        fetch('/api/pos/venta-directa', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(venta)
        })
        .then(res => res.text())
        .then(data => {
            if (data.startsWith('http')) {
                // Redirige al link de Mercado Pago
                window.location.href = data;
            } else {
                alert("🎉 Venta registrada correctamente en el sistema.");
                location.reload();
            }
        })
        .catch(err => {
            alert("Ocurrió un error al procesar la venta.");
            btn.disabled = false;
            btn.innerText = "Procesar Venta";
            console.error(err);
        });
    }
</script>

</body>
</html>
